<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecopark Bike Rental - Đăng nhập / Đăng ký</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-custom {
            background: radial-gradient(circle at 10% 10%, #f0fdf4 0%, #ffffff 50%);
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gradient-custom min-h-screen flex items-center justify-center p-4">

    <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        
        <div class="flex flex-col items-center text-center space-y-6">
            <div class="w-16 h-16 bg-[#10b981] rounded-full flex items-center justify-center text-white text-3xl shadow-lg">
                <i class="fas fa-bicycle"></i>
            </div>
            
            <div class="space-y-2">
                <h1 class="text-4xl font-bold text-slate-800">Ecopark Bike Rental</h1>
                <p class="text-gray-500 max-w-sm mx-auto">Hệ thống quản lý và cho thuê xe đạp thông minh tại Ecopark</p>
            </div>

            <div class="relative w-full max-w-md">
                <img src="https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?auto=format&fit=crop&q=80&w=1000" 
                     alt="Ecopark Bike" 
                     class="rounded-2xl shadow-2xl border-4 border-white object-cover h-64 w-full">
            </div>

            <div class="flex gap-4 w-full max-w-md">
                <div class="flex-1 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <div class="text-[#10b981] font-bold text-xl uppercase">500+</div>
                    <div class="text-xs text-gray-400">Xe đạp</div>
                </div>
                <div class="flex-1 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <div class="text-green-600 font-bold text-xl">10K+</div>
                    <div class="text-xs text-gray-400">Người dùng</div>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-50 max-w-md w-full mx-auto">
            
            <div class="flex bg-gray-100 p-1 rounded-xl mb-8">
                <button id="tabLogin" onclick="showForm('login')" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-slate-800 transition-all">Đăng nhập</button>
                <button id="tabRegister" onclick="showForm('register')" class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-slate-800 transition-all">Đăng ký</button>
            </div>

            <div id="formLogin" class="space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Đăng nhập</h2>
                    <p class="text-sm text-gray-400 mt-1">Nhập email và mật khẩu để đăng nhập vào hệ thống</p>
                </div>

                <form class="space-y-4">
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Email</label>
                        <div class="relative mt-1">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="far fa-envelope"></i>
                            </span>
                            <input type="email" placeholder="your.email@example.com" 
                                   class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Mật khẩu</label>
                        <div class="relative mt-1">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="fas fa-lock text-sm"></i>
                            </span>
                            <input type="password" placeholder="••••••••" 
                                   class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div class="flex items-center justify-between text-xs sm:text-sm">
                        <label class="flex items-center text-gray-500 cursor-pointer">
                            <input type="checkbox" class="mr-2 rounded border-gray-300 text-green-600"> Ghi nhớ đăng nhập
                        </label>
                        <a href="#" class="text-green-600 font-medium hover:underline">Quên mật khẩu?</a>
                    </div>
                    <button type="button" onclick="window.location.href='ViewLocationMapPage.html'" class="w-full bg-[#10b981] hover:bg-[#0da472] text-white font-bold py-3 rounded-xl transition-all shadow-lg mt-4">Đăng nhập</button>
                </form>
            </div>

            <div id="formRegister" class="space-y-6 hidden">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Tạo tài khoản</h2>
                    <p class="text-sm text-gray-400 mt-1">Điền thông tin để đăng ký thành viên mới</p>
                </div>

                <form class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Họ và tên</label>
                        <input type="text" placeholder="Nguyễn Văn A" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Email</label>
                        <input type="email" placeholder="your.email@example.com" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Số điện thoại</label>
                        <input type="tel" placeholder="0123456789" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Số căn cước công dân</label>
                        <input type="text" placeholder="001234567890" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-slate-700">Mật khẩu</label>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <button type="submit" class="w-full bg-[#10b981] hover:bg-[#0da472] text-white font-bold py-3 rounded-xl transition-all shadow-lg mt-4">Đăng ký</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        function showForm(type) {
            const loginForm = document.getElementById('formLogin');
            const registerForm = document.getElementById('formRegister');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('bg-white', 'shadow-sm', 'text-slate-800');
                tabLogin.classList.remove('text-gray-500');
                tabRegister.classList.remove('bg-white', 'shadow-sm', 'text-slate-800');
                tabRegister.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('bg-white', 'shadow-sm', 'text-slate-800');
                tabRegister.classList.remove('text-gray-500');
                tabLogin.classList.remove('bg-white', 'shadow-sm', 'text-slate-800');
                tabLogin.classList.add('text-gray-500');
            }
        }
    </script>
</body>
</html>
