<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Xe Đạp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h3 class="text-center text-primary mb-4">Thông tin Xe Đạp</h3>
                
                <form action="#" th:action="@{/xe-dap/luu}" th:object="${xe}" method="POST" class="border p-4 shadow-sm rounded">
                    
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã Xe (Ví dụ: ECO-001)</label>
                        <input type="text" class="form-control" th:field="*{bikeCode}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Trạng Thái</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="Đang rảnh">Đang rảnh</option>
                            <option value="Đang thuê">Đang thuê</option>
                            <option value="Cần sửa chữa">Cần sửa chữa</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Bãi Tập Kết</label>
                        <input type="text" class="form-control" th:field="*{stationName}" placeholder="Nhập tên bãi...">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Lưu Thông Tin</button>
                        <a th:href="@{/xe-dap}" class="btn btn-secondary">Hủy bỏ / Quay lại</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
