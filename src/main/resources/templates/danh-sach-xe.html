<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Xe đạp Ecopark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center text-success mb-4">Danh sách Xe đạp Ecopark</h2>
		<div class="mb-3 text-end">
		    <a th:href="@{/xe-dap/them}" class="btn btn-primary">+ Thêm Xe Mới</a>
		</div>
        <table class="table table-bordered table-hover text-center">
            <thead class="table-success">
				<th>Hành động</th>
                <tr>
                    <th>ID</th>
                    <th>Mã Xe</th>
                    <th>Trạng Thái</th>
                    <th>Bãi Tập Kết</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="xe : ${danhSachXe}">
					<td>
					    <a th:href="@{/xe-dap/sua/{id}(id=${xe.id})}" class="btn btn-warning btn-sm">Sửa</a>
					    
					    <a th:href="@{/xe-dap/xoa/{id}(id=${xe.id})}" class="btn btn-danger btn-sm"
					       onclick="return confirm('Bạn có chắc chắn muốn xóa chiếc xe này không?');">Xóa</a>
					</td>
                    <td th:text="${xe.id}"></td>
                    <td th:text="${xe.bikeCode}" class="fw-bold text-primary"></td>
                    <td th:text="${xe.status}"></td>
                    <td th:text="${xe.stationName}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
